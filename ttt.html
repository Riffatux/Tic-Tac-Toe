<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Game</title>
    <link rel="stylesheet" href="ttt.css">
</head>
<body>
    <div class="msg-container hide">
        <p id="msg">Winner</p>
        <button id="new-btn"><a href="#">New Game</a></button>
    </div>
    <main>
        <h1>Tic Tac Toe</h1>
        <div class="players">
        <span id="playerOname" class="active"></span>
        <span id="playerXname" ></span>
    </div>
        <div class="container">
            <div class="game">
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
            </div>
        </div>
        <button id="reset-btn"><a href="#">Reset Game</a></button>
    </main>
    <script src="app.js"></script>
</body>
</html>
